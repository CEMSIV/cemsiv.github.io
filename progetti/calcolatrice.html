<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatrice Scientifica</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --calc-bg: #212529;
            --display-bg: #e9ecef;
            --btn-bg: #495057;
            --btn-hover: #6c757d;
            --btn-operator: #f5a623;
            --btn-operator-hover: #f7b750;
            --btn-scientific: #0056b3;
            --btn-scientific-hover: #007bff;
            --btn-clear: #dc3545;
            --btn-clear-hover: #c82333;
            --btn-equals: #28a745;
            --btn-equals-hover: #218838;
            --text-light: #ffffff;
            --text-dark: #212529;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .calculator {
            background-color: var(--calc-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 340px;
        }

        .display-container {
            background-color: var(--display-bg);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: right;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        #expression {
            min-height: 20px;
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 5px;
            word-wrap: break-word;
        }

        #result {
            font-size: 2rem;
            color: var(--text-dark);
            font-weight: bold;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 15px 10px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-light);
            background-color: var(--btn-bg);
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        button:hover {
            background-color: var(--btn-hover);
        }

        .btn-operator {
            background-color: var(--btn-operator);
        }

        .btn-operator:hover {
            background-color: var(--btn-operator-hover);
        }

        .btn-scientific {
            background-color: var(--btn-scientific);
            font-size: 1rem;
        }

        .btn-scientific:hover {
            background-color: var(--btn-scientific-hover);
        }

        .btn-clear {
            background-color: var(--btn-clear);
        }

        .btn-clear:hover {
            background-color: var(--btn-clear-hover);
        }

        .btn-equals {
            background-color: var(--btn-equals);
            grid-column: span 2;
        }

        .btn-equals:hover {
            background-color: var(--btn-equals-hover);
        }
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display-container">
            <div id="expression"></div>
            <div id="result">0</div>
        </div>

        <div class="buttons-grid">
            <!-- Riga 1: Funzioni Scientifiche -->
            <button class="btn-scientific" onclick="appendScientific('sin')">sin</button>
            <button class="btn-scientific" onclick="appendScientific('cos')">cos</button>
            <button class="btn-scientific" onclick="appendScientific('tan')">tan</button>
            <button class="btn-scientific" onclick="appendScientific('sqrt')">√</button>

            <!-- Riga 2: Funzioni Scientifiche -->
            <button class="btn-scientific" onclick="appendScientific('log')">log</button>
            <button class="btn-scientific" onclick="appendValue('**')">x^y</button>
            <button class="btn-scientific" onclick="appendValue('Math.PI')">π</button>
            <button class="btn-scientific" onclick="appendValue('Math.E')">e</button>

            <!-- Riga 3: Controlli e Operatori Base -->
            <button class="btn-clear" onclick="clearDisplay()">C</button>
            <button class="btn-operator" onclick="appendValue('(')">(</button>
            <button class="btn-operator" onclick="appendValue(')')">)</button>
            <button class="btn-operator" onclick="appendValue('/')">÷</button>

            <!-- Riga 4 -->
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="btn-operator" onclick="appendValue('*')">×</button>

            <!-- Riga 5 -->
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="btn-operator" onclick="appendValue('-')">-</button>

            <!-- Riga 6 -->
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="btn-operator" onclick="appendValue('+')">+</button>

            <!-- Riga 7 -->
            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button class="btn-equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let currentExpression = '';
        const expressionDisplay = document.getElementById('expression');
        const resultDisplay = document.getElementById('result');

        function updateDisplay() {
            // Formatta l'espressione per renderla più leggibile all'utente
            let visualExpression = currentExpression
                .replace(/Math.sin/g, 'sin')
                .replace(/Math.cos/g, 'cos')
                .replace(/Math.tan/g, 'tan')
                .replace(/Math.sqrt/g, '√')
                .replace(/Math.log10/g, 'log')
                .replace(/Math.PI/g, 'π')
                .replace(/Math.E/g, 'e')
                .replace(/\*\*/g, '^')
                .replace(/\*/g, '×')
                .replace(/\//g, '÷');
                
            expressionDisplay.innerText = visualExpression;
        }

        function appendValue(val) {
            if (resultDisplay.innerText !== '0' && resultDisplay.innerText !== 'Errore' && currentExpression === '') {
                // Se c'è un risultato precedente e si digita un operatore, continua da lì
                if (['+', '-', '*', '/', '**'].includes(val)) {
                    currentExpression = resultDisplay.innerText + val;
                } else {
                    currentExpression = val;
                }
            } else {
                currentExpression += val;
            }
            updateDisplay();
        }

        function appendScientific(func) {
            if (func === 'sin') currentExpression += 'Math.sin(';
            if (func === 'cos') currentExpression += 'Math.cos(';
            if (func === 'tan') currentExpression += 'Math.tan(';
            if (func === 'sqrt') currentExpression += 'Math.sqrt(';
            if (func === 'log') currentExpression += 'Math.log10(';
            updateDisplay();
        }

        function clearDisplay() {
            currentExpression = '';
            expressionDisplay.innerText = '';
            resultDisplay.innerText = '0';
        }

        function calculate() {
            if (currentExpression === '') return;
            
            try {
                // Valuta l'espressione matematica
                let result = eval(currentExpression);
                
                // Arrotonda per evitare problemi di precisione in JS (es. 0.1 + 0.2)
                result = Math.round(result * 100000000) / 100000000;
                
                resultDisplay.innerText = result;
                currentExpression = ''; // Resetta l'espressione per un nuovo calcolo
            } catch (error) {
                resultDisplay.innerText = 'Errore';
                currentExpression = '';
            }
        }
    </script>
</body>
</html>
